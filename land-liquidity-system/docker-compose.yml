version: '3.8'

services:
  # PostgreSQL с PostGIS для хранения геоданных
  postgres:
    image: postgis/postgis:15-3.4
    container_name: land_liquidity_postgres
    environment:
      POSTGRES_DB: land_liquidity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - land_liquidity_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d land_liquidity"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis для кэширования и очередей
  redis:
    image: redis:7-alpine
    container_name: land_liquidity_redis
    command: redis-server --appendonly yes --requirepass redis_password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - land_liquidity_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # RabbitMQ для асинхронных задач Celery
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: land_liquidity_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: rabbit_user
      RABBITMQ_DEFAULT_PASS: rabbit_password
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    ports:
      - "5672:5672"
      - "15672:15672"  # Web UI
    networks:
      - land_liquidity_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO для хранения файлов (аналог S3)
  minio:
    image: minio/minio:latest
    container_name: land_liquidity_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    networks:
      - land_liquidity_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # OSRM для маршрутизации (можно использовать готовые данные)
  osrm:
    image: osrm/osrm-backend:latest
    container_name: land_liquidity_osrm
    command: osrm-routed --algorithm mld /data/russia-latest.osrm
    volumes:
      - osrm_data:/data
    ports:
      - "5000:5000"
    networks:
      - land_liquidity_network
    restart: unless-stopped
    # Примечание: нужно предварительно загрузить и обработать данные OSM

  # Backend сервис (FastAPI)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: land_liquidity_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/land_liquidity
      - REDIS_URL=redis://:redis_password@redis:6379/0
      - RABBITMQ_URL=amqp://rabbit_user:rabbit_password@rabbitmq:5672//
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio_admin
      - MINIO_SECRET_KEY=minio_password123
      - ENVIRONMENT=development
      - DEBUG=True
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - ./models:/app/models
    ports:
      - "8000:8000"
    networks:
      - land_liquidity_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery worker для фоновых задач
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: land_liquidity_celery_worker
    command: celery -A src.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/land_liquidity
      - REDIS_URL=redis://:redis_password@redis:6379/0
      - RABBITMQ_URL=amqp://rabbit_user:rabbit_password@rabbitmq:5672//
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio_admin
      - MINIO_SECRET_KEY=minio_password123
      - ENVIRONMENT=development
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - ./models:/app/models
    networks:
      - land_liquidity_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # Celery beat для периодических задач
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: land_liquidity_celery_beat
    command: celery -A src.tasks.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/land_liquidity
      - REDIS_URL=redis://:redis_password@redis:6379/0
      - RABBITMQ_URL=amqp://rabbit_user:rabbit_password@rabbitmq:5672//
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio_admin
      - MINIO_SECRET_KEY=minio_password123
      - ENVIRONMENT=development
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    networks:
      - land_liquidity_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # MLflow для управления ML экспериментами
  mlflow:
    image: python:3.10-slim
    container_name: land_liquidity_mlflow
    command: mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri postgresql://postgres:postgres@postgres:5432/land_liquidity --default-artifact-root s3://mlflow-artifacts/ --artifact-root s3://mlflow-artifacts/
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minio_admin
      - AWS_SECRET_ACCESS_KEY=minio_password123
      - MLFLOW_TRACKING_URI=http://mlflow:5001
    ports:
      - "5001:5001"
    networks:
      - land_liquidity_network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # Prometheus для мониторинга
  prometheus:
    image: prom/prometheus:latest
    container_name: land_liquidity_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - land_liquidity_network
    restart: unless-stopped

  # Grafana для визуализации метрик
  grafana:
    image: grafana/grafana:latest
    container_name: land_liquidity_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    networks:
      - land_liquidity_network
    depends_on:
      - prometheus
    restart: unless-stopped

  # Nginx как reverse proxy
  nginx:
    image: nginx:alpine
    container_name: land_liquidity_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    networks:
      - land_liquidity_network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Airflow для оркестрации ETL процессов
  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: land_liquidity_airflow_webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR= CeleryExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql://postgres:postgres@postgres:5432/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://:redis_password@redis:6379/1
      - AIRFLOW__CELERY__RESULT_BACKEND=redis://:redis_password@redis:6379/2
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__API__AUTH_BACKEND=airflow.api.auth.backend.basic_auth
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    ports:
      - "8080:8080"
    networks:
      - land_liquidity_network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: land_liquidity_airflow_scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql://postgres:postgres@postgres:5432/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://:redis_password@redis:6379/1
      - AIRFLOW__CELERY__RESULT_BACKEND=redis://:redis_password@redis:6379/2
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    networks:
      - land_liquidity_network
    depends_on:
      - postgres
      - redis
      - airflow-webserver
    restart: unless-stopped

  airflow-worker:
    image: apache/airflow:2.8.0
    container_name: land_liquidity_airflow_worker
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql://postgres:postgres@postgres:5432/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://:redis_password@redis:6379/1
      - AIRFLOW__CELERY__RESULT_BACKEND=redis://:redis_password@redis:6379/2
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    networks:
      - land_liquidity_network
    depends_on:
      - postgres
      - redis
      - airflow-webserver
    restart: unless-stopped

  # Elasticsearch для поиска и аналитики (опционально)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: land_liquidity_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - land_liquidity_network
    restart: unless-stopped

  # Kibana для визуализации Elasticsearch данных (опционально)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.8.0
    container_name: land_liquidity_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - land_liquidity_network
    depends_on:
      - elasticsearch
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  minio_data:
    driver: local
  osrm_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local

  # Frontend (React/Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./frontend:/app
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  land_liquidity_network:
    driver: bridge
